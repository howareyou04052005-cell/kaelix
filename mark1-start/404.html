<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | ANSAR</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --shade-obsidian: #03050b;
      --shade-midnight: #071a2e;
      --shade-blue: #315cff;
      --shade-teal: #28e7c5;
      --shade-champagne: #f3e7c8;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', Arial, sans-serif;
      color: var(--shade-champagne);
      background:
        radial-gradient(circle at 14% 8%, rgba(49,92,255,0.22), transparent 31%),
        radial-gradient(circle at 86% 22%, rgba(40,231,197,0.16), transparent 30%),
        radial-gradient(circle at 55% 88%, rgba(243,231,200,0.055), transparent 34%),
        linear-gradient(135deg, var(--shade-obsidian) 0%, var(--shade-midnight) 47%, #04101c 72%, var(--shade-obsidian) 100%);
      background-attachment: fixed;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .error-container {
      text-align: center;
      max-width: 600px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .error-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(49,92,255,0.45) 0%, rgba(40,231,197,0.18) 44%, transparent 72%);
      filter: blur(120px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
    }

    .error-code {
      font-size: clamp(100px, 22vw, 220px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 20px;
      background: linear-gradient(120deg, var(--shade-champagne) 0%, var(--shade-teal) 44%, var(--shade-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-tag {
      display: inline-block;
      padding: 9px 18px;
      background: rgba(243,231,200,0.055);
      border: 1px solid rgba(243,231,200,0.16);
      border-radius: 999px;
      color: var(--shade-champagne);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 22px;
      backdrop-filter: blur(10px);
    }

    .error-title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      color: var(--shade-champagne);
      margin-bottom: 18px;
      line-height: 1.15;
    }

    .error-message {
      color: rgba(243,231,200,0.68);
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 38px;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 34px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--shade-blue) 0%, var(--shade-teal) 62%, var(--shade-champagne) 115%);
      color: #02040a;
      box-shadow: 0 18px 48px rgba(40,231,197,0.18);
      transition: 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    .home-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 56px rgba(40,231,197,0.30);
    }

    .home-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .brand-mark {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.18em;
      background: linear-gradient(120deg, var(--shade-champagne) 0%, var(--shade-teal) 44%, var(--shade-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    @media (max-width: 500px) {
      .error-code {
        font-size: 110px;
      }
      .error-title {
        font-size: 26px;
      }
      .error-message {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <a href="/" class="brand-mark">ANSAR</a>

  <div class="error-glow"></div>

  <div class="error-container">
    <span class="error-tag">Error 404</span>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">This page got lost in space.</h2>
    <p class="error-message">
      The page you are looking for doesn't exist or has been moved.
      Let's get you back to where the magic happens.
    </p>
    <a href="/" class="home-btn">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 12L12 3l9 9v9a2 2 0 0 1-2 2h-4v-7H10v7H6a2 2 0 0 1-2-2v-9z"/>
      </svg>
      Back to Home
    </a>
  </div>

</body>
</html>
